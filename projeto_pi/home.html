<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ServiçosJá - Home</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: sans-serif;
      }
      body {
        background-color: #fff;
        padding-bottom: 60px;
      }
      .main-header {
        background-color: #ff8a00;
        padding: 15px;
        color: white;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }
      .header-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .user-profile img {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        border: 2px solid white;
        object-fit: cover;
      }
      .logo-text {
        font-size: 1.5rem;
        font-weight: bold;
        color: #002d5e;
      }
      .logo-text span {
        color: #e30613;
      }
      .menu-hamburger {
        cursor: pointer;
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .menu-hamburger span {
        width: 30px;
        height: 4px;
        background: #002d5e;
        border-radius: 2px;
      }
      .content {
        padding: 20px;
      }
      .action-card {
        width: 100%;
        background: #ffdab9;
        border: 1.5px solid #ff5c00;
        border-radius: 25px;
        padding: 20px;
        display: flex;
        align-items: center;
        gap: 15px;
        font-size: 1.2rem;
        font-weight: bold;
        cursor: pointer;
      }
      .main-footer {
        position: fixed;
        bottom: 0;
        width: 100%;
        height: 50px;
        background-color: #ff8a00;
      }
      .side-menu {
        position: fixed;
        top: 0;
        right: -250px;
        width: 250px;
        height: 100%;
        background: #fff;
        box-shadow: -2px 0 10px rgba(0, 0, 0, 0.2);
        transition: 0.3s;
        z-index: 1000;
        padding-top: 60px;
      }
      .side-menu.active {
        right: 0;
      }
      .side-menu ul {
        list-style: none;
        padding: 20px;
      }
      .side-menu ul li {
        padding: 15px 0;
        border-bottom: 1px solid #eee;
      }
      .side-menu ul li a {
        text-decoration: none;
        color: #333;
        font-weight: bold;
      }
      .task-item {
        background: #fff;
        border-left: 6px solid #ff8a00;
        border-radius: 12px;
        padding: 15px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 10px;
      }
      .task-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .task-badge {
        background: #e0eaff;
        color: #002d5e;
        font-size: 0.7rem;
        padding: 4px 8px;
        border-radius: 20px;
        font-weight: bold;
      }
      .btn-match-task {
        background: #28a745;
        color: white;
        border: none;
        padding: 10px;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <header class="main-header">
        <div class="header-top">
          <div class="user-profile">
            <img
              src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
              alt="Perfil"
              id="imgHeader"
            />
            <div
              id="letraHeader"
              style="
                display: none;
                width: 50px;
                height: 50px;
                border-radius: 50%;
                background-color: #002d5e;
                color: white;
                justify-content: center;
                align-items: center;
                font-size: 1.5rem;
                font-weight: bold;
              "
            ></div>
          </div>
          <div class="logo-text">Serviços<span>Já</span></div>
          <div class="menu-hamburger" onclick="toggleMenu()">
            <span></span><span></span><span></span>
          </div>
        </div>
      </header>

      <nav id="sideMenu" class="side-menu">
        <ul>
          <li style="text-align: center">
            <img
              src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
              alt="Perfil"
              id="imgMenu"
              style="
                width: 8rem;
                height: 8rem;
                border-radius: 50%;
                object-fit: cover;
              "
            />
            <div
              id="letraMenu"
              style="
                display: none;
                margin: 0 auto;
                width: 8rem;
                height: 8rem;
                border-radius: 50%;
                background-color: #002d5e;
                color: white;
                justify-content: center;
                align-items: center;
                font-size: 3.5rem;
                font-weight: bold;
              "
            ></div>
            <h3 id="nomeUsuarioMenu" style="margin-top: 15px; color: #002d5e">
              Carregando...
            </h3>
          </li>
          <li><a href="telaPerfil.html">Meu Perfil</a></li>
          <li><a href="telaHistorico.html">Histórico</a></li>
          <li><a href="telaSuporte.html">Suporte</a></li>
          <li><a href="#" id="btnSair" style="color: red">Sair</a></li>
        </ul>
      </nav>

      <main
        class="content"
        style="
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 20px;
          width: 100%;
        "
      >
        <div
          id="viewContratante"
          class="view"
          style="
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 400px;
          "
        >
          <button
            class="action-card"
            onclick="window.location.href = 'telaSolicitacao.html'"
          >
            <div class="icon">🔍</div>
            <span>Solicitar Novo Serviço</span>
          </button>
          <h3
            style="
              color: #002d5e;
              border-bottom: 2px solid #ff8a00;
              padding-bottom: 5px;
            "
          >
            Status dos meus Pedidos:
          </h3>
          <div
            id="listaStatusCliente"
            style="display: flex; flex-direction: column; gap: 15px"
          >
            <p style="color: #999; text-align: center; font-size: 0.9rem">
              Nenhum serviço solicitado.
            </p>
          </div>
        </div>

        <div
          id="viewProfissional"
          class="view"
          style="
            display: none;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 400px;
          "
        >
          <h3
            style="
              color: #002d5e;
              border-bottom: 2px solid #28a745;
              padding-bottom: 5px;
            "
          >
            Minha Lista de Tarefas:
          </h3>
          <div
            id="listaPedidosProfissional"
            style="display: flex; flex-direction: column; gap: 15px"
          >
            <p style="color: #666; text-align: center">Buscando tarefas...</p>
          </div>
        </div>
      </main>

      <footer class="main-footer"></footer>
    </div>
    <div id="modalNovoPedido" class="modal-overlay" style="display: none">
      <div class="modal-content">
        <div class="pulse-ring"></div>
        <h2 style="color: #ff8a00; margin-bottom: 10px">🚨 Novo Serviço!</h2>
        <h3 id="popupServico" style="color: #002d5e">Eletricista</h3>
        <p id="popupCliente" style="color: #666; margin-top: 5px">
          Cliente: Carregando...
        </p>
        <p
          id="popupEndereco"
          style="font-size: 0.8rem; margin: 10px 0 20px; font-weight: bold"
        >
          📍 Carregando...
        </p>

        <div style="display: flex; gap: 10px; width: 100%">
          <button
            onclick="fecharPopup()"
            style="
              flex: 1;
              background: #eee;
              border: none;
              padding: 12px;
              border-radius: 10px;
              font-weight: bold;
              cursor: pointer;
              color: #555;
            "
          >
            Ignorar
          </button>
          <button
            id="btnPopupAceitar"
            style="
              flex: 2;
              background: #28a745;
              border: none;
              padding: 12px;
              border-radius: 10px;
              font-weight: bold;
              cursor: pointer;
              color: white;
              font-size: 1.1rem;
            "
          >
            ✅ Aceitar Rápido
          </button>
        </div>
      </div>
    </div>

    <script>
      const idUsuario = localStorage.getItem("usuarioId");
      const nomeSalvo = localStorage.getItem("usuarioNome");

      if (!idUsuario) {
        window.location.href = "telaLogin.html";
      }

      async function inicializarHome() {
        if (nomeSalvo) {
          const primeiroNome = nomeSalvo.split(" ")[0];
          document.getElementById("nomeUsuarioMenu").textContent =
            `Olá, ${primeiroNome}!`;
        }
        try {
          const resposta = await fetch(
            `https://testenpm.vercel.app/perfil/${idUsuario}`,
          );
          const dados = await resposta.json();

          if (resposta.ok) {
            configurarFotosPerfil(dados);
            carregarStatusPedidosCliente(); // Carrega os pedidos do cliente

            // Verifica se é profissional para mostrar a aba de tarefas
            if (
              dados.profissoes_usuario &&
              dados.profissoes_usuario !== "Profissional" &&
              dados.profissoes_usuario !== "Selecione uma Opção"
            ) {
              document.getElementById("viewProfissional").style.display =
                "flex";
              carregarPedidosPendentes();
            }
          }
        } catch (erro) {
          console.error("Erro:", erro);
        }
      }

      function configurarFotosPerfil(dados) {
        const letraInicial = nomeSalvo
          ? nomeSalvo.charAt(0).toUpperCase()
          : "?";
        if (dados.foto_perfil) {
          document.getElementById("imgHeader").src = dados.foto_perfil;
          document.getElementById("imgMenu").src = dados.foto_perfil;
        } else {
          document.getElementById("imgHeader").style.display = "none";
          document.getElementById("letraHeader").textContent = letraInicial;
          document.getElementById("letraHeader").style.display = "flex";
          document.getElementById("imgMenu").style.display = "none";
          document.getElementById("letraMenu").textContent = letraInicial;
          document.getElementById("letraMenu").style.display = "flex";
        }
      }

      // ------------------------------------------------------------------
      // FUNÇÕES DO PROFISSIONAL
      // ------------------------------------------------------------------
      // Memória do Radar
      let idsConhecidos = [];
      let primeiraCarga = true;
      const somAlerta = new Audio(
        "https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3",
      );

      async function carregarPedidosPendentes() {
        const container = document.getElementById("listaPedidosProfissional");
        try {
          const r = await fetch(
            `https://testenpm.vercel.app/pedidos/${idUsuario}`,
          );
          let pedidos = await r.json();

          const recusadasStr = localStorage.getItem("tarefasRecusadas");
          const tarefasRecusadas = recusadasStr ? JSON.parse(recusadasStr) : [];
          pedidos = pedidos.filter(
            (p) =>
              !tarefasRecusadas.includes(p.id_solicitacao) ||
              p.id_profissional == idUsuario,
          );

          // LÓGICA DO POP-UP DE ALERTA
          const idsAtuais = pedidos.map((p) => p.id_solicitacao);

          if (!primeiraCarga) {
            // Procura se tem algum pedido novo que não estava na lista anterior E que ainda não tem dono
            const novos = pedidos.filter(
              (p) =>
                !idsConhecidos.includes(p.id_solicitacao) &&
                p.id_profissional === null,
            );

            if (novos.length > 0) {
              mostrarPopupNovoPedido(novos[0]); // Mostra o pop-up pro primeiro pedido novo
            }
          }
          idsConhecidos = idsAtuais;
          primeiraCarga = false;

          // Desenha a lista normal por trás (já tínhamos isso)
          container.innerHTML = pedidos.length
            ? ""
            : "<p>Nenhuma tarefa pendente no momento.</p>";

          pedidos.forEach((p) => {
            const div = document.createElement("div");
            div.className = "task-item";
            const jaEhMeu = p.id_profissional == idUsuario;
            const corBadge = jaEhMeu ? "#28a745" : "#ff8a00";
            const textoBadge = jaEhMeu ? "Em Andamento" : "Novo";

            const botoesHTML = jaEhMeu
              ? `<button class="btn-match-task" style="background: #002d5e; width: 100%;" onclick="window.location.href='telaChat.html?id=${p.id_solicitacao}'">💬 Abrir Chat</button>`
              : `<div style="display: flex; gap: 10px; margin-top: 5px;">
                   <button class="btn-match-task" style="flex: 1;" onclick="darMatch(${p.id_solicitacao})">✅ Aceitar</button>
                   <button class="btn-match-task" style="background: #dc3545; flex: 1;" onclick="recusarTarefa(${p.id_solicitacao})">❌ Recusar</button>
                 </div>`;

            div.innerHTML = `
                <div class="task-header">
                    <strong>${p.nome_cliente}</strong>
                    <span class="task-badge" style="background: ${corBadge}; color: white; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem;">${textoBadge}</span>
                </div>
                <p style="font-size: 0.8rem; margin: 5px 0;">📍 ${p.endereco_servico}</p>
                ${botoesHTML}`;
            container.appendChild(div);
          });
        } catch (erro) {
          console.error("Erro ao carregar pedidos:", erro);
        }
      }

      // Funções de Controle do Pop-up
      function mostrarPopupNovoPedido(pedido) {
        document.getElementById("popupServico").textContent =
          pedido.tipo_servico;
        document.getElementById("popupCliente").textContent =
          `Cliente: ${pedido.nome_cliente}`;
        document.getElementById("popupEndereco").textContent =
          `📍 ${pedido.endereco_servico}`;

        // Configura o botão verde do pop-up para dar match e já fechar a tela
        document.getElementById("btnPopupAceitar").onclick = () => {
          fecharPopup();
          darMatch(pedido.id_solicitacao);
        };

        document.getElementById("modalNovoPedido").style.display = "flex";
        somAlerta.play().catch((e) => console.log("Áudio bloqueado"));
      }

      function fecharPopup() {
        document.getElementById("modalNovoPedido").style.display = "none";
      }

      // O RADAR: Roda a busca de forma silenciosa a cada 5 segundos
      setInterval(() => {
        if (
          document.getElementById("viewProfissional").style.display === "flex"
        ) {
          carregarPedidosPendentes();
        }
      }, 5000);

      async function darMatch(idPedido) {
        if (!confirm("Deseja aceitar este serviço agora?")) return;
        try {
          const resposta = await fetch(
            `https://testenpm.vercel.app/pedidos/${idPedido}/aceitar`,
            {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ idProfissional: idUsuario }),
            },
          );
          if (resposta.ok) {
            alert("Match realizado! Iniciando conversa...");
            window.location.href = `telaChat.html?id=${idPedido}`;
          } else {
            alert("Erro ao aceitar pedido.");
            carregarPedidosPendentes();
          }
        } catch (erro) {
          console.error("Erro:", erro);
        }
      }

      function recusarTarefa(idPedido) {
        if (!confirm("Deseja ocultar este pedido?")) return;
        const recusadasStr = localStorage.getItem("tarefasRecusadas");
        let tarefasRecusadas = recusadasStr ? JSON.parse(recusadasStr) : [];
        if (!tarefasRecusadas.includes(idPedido)) {
          tarefasRecusadas.push(idPedido);
          localStorage.setItem(
            "tarefasRecusadas",
            JSON.stringify(tarefasRecusadas),
          );
        }
        carregarPedidosPendentes();
      }

      // ------------------------------------------------------------------
      // FUNÇÕES DO CLIENTE
      // ------------------------------------------------------------------
      async function carregarStatusPedidosCliente() {
        const container = document.getElementById("listaStatusCliente");
        try {
          const r = await fetch(
            `https://testenpm.vercel.app/pedidos-cliente/${idUsuario}`,
          );
          const pedidos = await r.json();

          if (pedidos.length > 0) {
            container.innerHTML = "";
            pedidos.forEach((p) => {
              let cor = "#FF8A00";
              let icone = "⏳ Pendente";

              if (p.status_pedido === "Aceito") {
                cor = "#28a745";
                icone = "✅ Aceito";
              }
              if (p.status_pedido === "Concluído") {
                cor = "#002D5E";
                icone = "🏁 Concluído";
              }
              if (p.status_pedido === "Avaliado") {
                cor = "#999";
                icone = "⭐ Avaliado";
              }

              const div = document.createElement("div");
              div.style = `background: #f9f9f9; border-radius: 12px; padding: 12px; border-left: 6px solid ${cor}; margin-bottom: 10px;`;

              let htmlInterno = `
                  <strong>${p.tipo_servico}</strong><br>
                  <span style="color:${cor}; font-size: 0.8rem; font-weight:bold;">${icone}</span>
              `;

              if (p.status_pedido === "Aceito") {
                htmlInterno += `
                      <button onclick="window.location.href='telaChat.html?id=${p.id_solicitacao}'" style="width: 100%; margin-top: 10px; background: #28a745; color: white; border: none; padding: 8px; border-radius: 10px; cursor: pointer; font-weight: bold;">
                          💬 Conversar com Profissional
                      </button>`;
              }
              if (p.status_pedido === "Concluído") {
                htmlInterno += `
                      <button onclick="window.location.href='telaAvaliacao.html?id=${p.id_solicitacao}'" style="width: 100%; margin-top: 10px; background: #FF8A00; color: white; border: none; padding: 8px; border-radius: 10px; cursor: pointer; font-weight: bold;">
                          ⭐ Avaliar Profissional
                      </button>`;
              }

              div.innerHTML = htmlInterno;
              container.appendChild(div);
            });
          }
        } catch (e) {
          console.error(e);
        }
      }

      // ------------------------------------------------------------------
      // UTILITÁRIOS
      // ------------------------------------------------------------------
      function toggleMenu() {
        document.getElementById("sideMenu").classList.toggle("active");
      }

      document.getElementById("btnSair").addEventListener("click", () => {
        if (confirm("Sair?")) {
          localStorage.clear();
          window.location.href = "telaLogin.html";
        }
      });

      document.addEventListener("DOMContentLoaded", inicializarHome);
    </script>
  </body>
</html>
